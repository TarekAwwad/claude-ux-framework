<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledgerline — Business Health</title>
<style>
/* Ledgerline design tokens. Fixture for the with/without validation runs:
   both builds must inline this block verbatim and build strictly from it.
   Light is the default; the dark block activates via prefers-color-scheme. */
:root {
  --bg: #f6f7f9;
  --surface: #ffffff;
  --text: #1a2233;
  --text-2: #55617a;
  --text-3: #8a94ab;
  --border: #e3e7ee;
  --accent: #2f6bff;
  --accent-strong: #1f4fd6;
  --good: #17805c;
  --good-bg: #e3f4ec;
  --bad: #c2372e;
  --bad-bg: #fbe9e7;
  --warn: #9a6a00;
  --warn-bg: #fff3d6;
  --chart-line: #2f6bff;
  --chart-fill: rgba(47, 107, 255, 0.10);
  --font: system-ui, "Segoe UI", Roboto, sans-serif;
  --radius: 10px;
  --shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
  /* spacing scale: draw every margin, padding, and gap from these steps */
  --s1: 4px;
  --s2: 8px;
  --s3: 12px;
  --s4: 16px;
  --s5: 24px;
  --s6: 32px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #11151d;
    --surface: #1a2029;
    --text: #e8ecf4;
    --text-2: #a7b0c3;
    --text-3: #707a90;
    --border: #2a3140;
    --accent: #6b96ff;
    --accent-strong: #8fadff;
    --good: #4cc394;
    --good-bg: #14322a;
    --bad: #ef8a7f;
    --bad-bg: #3a1f1c;
    --warn: #d9b25e;
    --warn-bg: #35290f;
    --chart-line: #6b96ff;
    --chart-fill: rgba(107, 150, 255, 0.14);
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.45;
}

.wrap {
  max-width: 1080px;
  margin: 0 auto;
  padding: var(--s5) var(--s4) var(--s6);
}

/* Header */
header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: var(--s2);
  margin-bottom: var(--s5);
}
.brand { font-size: 20px; font-weight: 700; }
.brand span { color: var(--accent); }
.asof { color: var(--text-3); font-size: 13px; }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: var(--s4);
}
.card h2 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-2);
  margin-bottom: var(--s3);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* KPI row */
.kpis {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: var(--s4);
  margin-bottom: var(--s4);
}
.kpi { cursor: pointer; text-align: left; font: inherit; color: inherit; width: 100%; }
.kpi:focus-visible, .tab:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.kpi[aria-pressed="true"] { border-color: var(--accent); }
.kpi-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.kpi-value {
  font-size: 26px;
  font-weight: 700;
  margin-top: var(--s1);
  font-variant-numeric: tabular-nums;
}
.kpi-delta {
  display: inline-block;
  margin-top: var(--s1);
  padding: var(--s1) var(--s2);
  border-radius: var(--radius);
  font-size: 12px;
  font-weight: 600;
}
.kpi-delta.up   { color: var(--good); background: var(--good-bg); }
.kpi-delta.down { color: var(--bad);  background: var(--bad-bg); }
.kpi-note { display: block; margin-top: var(--s1); font-size: 12px; color: var(--text-3); }
.spark { margin-top: var(--s3); display: block; width: 100%; height: 36px; }

/* Trend section */
.trend { margin-bottom: var(--s4); }
.trend-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: var(--s3);
  margin-bottom: var(--s3);
}
.tabs { display: flex; gap: var(--s2); flex-wrap: wrap; }
.tab {
  font: inherit;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-2);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: var(--s1) var(--s3);
  cursor: pointer;
}
.tab[aria-selected="true"] {
  color: var(--surface);
  background: var(--accent);
  border-color: var(--accent-strong);
}
.trend-sub { font-size: 13px; color: var(--text-3); }
#trendChart { display: block; width: 100%; height: auto; }
.axis-text { fill: var(--text-3); font-family: var(--font); font-size: 11px; }
.grid-line { stroke: var(--border); stroke-width: 1; }
.pt-label { fill: var(--text-2); font-family: var(--font); font-size: 11px; font-weight: 600; }

/* Two-column band */
.band {
  display: grid;
  grid-template-columns: 2fr 3fr;
  gap: var(--s4);
  align-items: start;
}
@media (max-width: 860px) { .band { grid-template-columns: 1fr; } }

/* Feature adoption */
.adopt-row { display: grid; grid-template-columns: 110px 1fr 42px; align-items: center; gap: var(--s3); }
.adopt-row + .adopt-row { margin-top: var(--s3); }
.adopt-name { font-size: 13px; color: var(--text-2); }
.adopt-track {
  background: var(--chart-fill);
  border-radius: var(--radius);
  height: var(--s2);
  overflow: hidden;
}
.adopt-fill { background: var(--accent); height: 100%; border-radius: var(--radius); }
.adopt-pct { font-size: 13px; font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }

/* Signups table */
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: var(--s2) var(--s3); text-align: left; white-space: nowrap; }
th {
  color: var(--text-3);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border-bottom: 1px solid var(--border);
}
td { border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
td.num { text-align: right; font-variant-numeric: tabular-nums; }
th.num { text-align: right; }
.company { font-weight: 600; }
.muted { color: var(--text-2); }
.status {
  display: inline-block;
  padding: var(--s1) var(--s2);
  border-radius: var(--radius);
  font-size: 12px;
  font-weight: 600;
  text-transform: capitalize;
}
.status.active  { color: var(--good); background: var(--good-bg); }
.status.trial   { color: var(--warn); background: var(--warn-bg); }
.status.churned { color: var(--bad);  background: var(--bad-bg); }

footer { margin-top: var(--s5); color: var(--text-3); font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">Ledger<span>line</span> <span class="muted" style="color: var(--text-2); font-weight: 400; font-size: 14px;">business health</span></div>
    <div class="asof">Data as of 2026-07-19</div>
  </header>

  <section class="kpis" id="kpis" aria-label="Key metrics"></section>

  <section class="card trend" aria-label="Metric history">
    <div class="trend-head">
      <div>
        <h2 id="trendTitle" style="margin-bottom: var(--s1);">MRR, last 13 months</h2>
        <div class="trend-sub" id="trendSub"></div>
      </div>
      <div class="tabs" role="tablist" aria-label="Choose metric" id="tabs"></div>
    </div>
    <svg id="trendChart" viewBox="0 0 960 300" role="img" aria-labelledby="trendTitle"></svg>
  </section>

  <div class="band">
    <section class="card" aria-label="Feature adoption">
      <h2>Feature adoption</h2>
      <div id="adoption"></div>
    </section>

    <section class="card" aria-label="Recent signups">
      <h2>Recent signups</h2>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Company</th><th>Plan</th><th class="num">Seats</th>
              <th class="num">MRR</th><th>Signed up</th><th>Status</th>
            </tr>
          </thead>
          <tbody id="signups"></tbody>
        </table>
      </div>
    </section>
  </div>

  <footer>Ledgerline invoicing automation. All figures update daily; last refresh 2026-07-19.</footer>
</div>

<script>
"use strict";
// ---- Data (hardcoded from fixture, verbatim) ----
const DATA = {
  product: "Ledgerline",
  as_of: "2026-07-19",
  months: ["2025-07", "2025-08", "2025-09", "2025-10", "2025-11", "2025-12", "2026-01", "2026-02", "2026-03", "2026-04", "2026-05", "2026-06", "2026-07"],
  mrr_usd: [62400, 64100, 65800, 67900, 69400, 71600, 73200, 75100, 77400, 79000, 80900, 82600, 84120],
  churn_pct: [3.4, 3.2, 3.3, 3.0, 2.9, 2.7, 2.8, 2.5, 2.4, 2.2, 2.1, 2.0, 1.8],
  weekly_active_users: [890, 910, 946, 972, 1004, 1035, 1061, 1090, 1122, 1158, 1189, 1233, 1284],
  feature_adoption_pct: [
    { feature: "Automations", pct: 89 },
    { feature: "Shared inboxes", pct: 83 },
    { feature: "API access", pct: 72 },
    { feature: "Reporting", pct: 60 },
    { feature: "Slack sync", pct: 51 },
    { feature: "CSV export", pct: 31 },
    { feature: "SSO / SAML", pct: 18 }
  ],
  recent_signups: [
    { company: "Quill Analytics", plan: "Growth", seats: 18, mrr_usd: 882, signed_up: "2026-07-19", status: "trial" },
    { company: "Copperline HVAC", plan: "Starter", seats: 4, mrr_usd: 116, signed_up: "2026-07-19", status: "active" },
    { company: "Marrow Bio", plan: "Scale", seats: 34, mrr_usd: 2686, signed_up: "2026-07-18", status: "trial" },
    { company: "Pinebox Studio", plan: "Starter", seats: 6, mrr_usd: 174, signed_up: "2026-07-17", status: "active" },
    { company: "Atlas Cargo", plan: "Growth", seats: 22, mrr_usd: 1078, signed_up: "2026-07-16", status: "active" },
    { company: "Verity Audit", plan: "Growth", seats: 11, mrr_usd: 539, signed_up: "2026-07-14", status: "trial" },
    { company: "Harbor & Lane", plan: "Starter", seats: 3, mrr_usd: 87, signed_up: "2026-07-12", status: "churned" },
    { company: "Oakfield Schools", plan: "Scale", seats: 40, mrr_usd: 3160, signed_up: "2026-07-10", status: "active" },
    { company: "Fernworks", plan: "Starter", seats: 5, mrr_usd: 145, signed_up: "2026-07-08", status: "trial" },
    { company: "Sundial Travel", plan: "Growth", seats: 14, mrr_usd: 686, signed_up: "2026-07-05", status: "active" },
    { company: "Rove Logistics", plan: "Growth", seats: 19, mrr_usd: 931, signed_up: "2026-07-02", status: "active" },
    { company: "Meridian Clinics", plan: "Scale", seats: 27, mrr_usd: 2133, signed_up: "2026-06-28", status: "active" },
    { company: "Tessel Print", plan: "Starter", seats: 2, mrr_usd: 58, signed_up: "2026-06-25", status: "trial" },
    { company: "Bluestem Farms", plan: "Starter", seats: 7, mrr_usd: 203, signed_up: "2026-06-22", status: "active" }
  ]
};

// ---- Formatters ----
const fmtUSD = v => "$" + v.toLocaleString("en-US");
const fmtPct = v => v.toFixed(1) + "%";
const fmtNum = v => v.toLocaleString("en-US");
const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function monthLabel(m) {
  const [y, mo] = m.split("-");
  return MONTH_NAMES[parseInt(mo, 10) - 1] + " ’" + y.slice(2);
}

// ---- Metric definitions ----
// downIsGood: for churn, a decrease is a positive signal.
const METRICS = {
  mrr: {
    label: "MRR",
    title: "MRR, last 13 months",
    series: DATA.mrr_usd,
    fmt: fmtUSD,
    downIsGood: false,
    deltaText(cur, prev) {
      const pct = ((cur - prev) / prev) * 100;
      return (cur >= prev ? "+" : "−") + fmtUSD(Math.abs(cur - prev)) + " (" + (pct >= 0 ? "+" : "") + pct.toFixed(1) + "%) vs June";
    }
  },
  churn: {
    label: "Churn",
    title: "Monthly churn rate, last 13 months",
    series: DATA.churn_pct,
    fmt: fmtPct,
    downIsGood: true,
    deltaText(cur, prev) {
      const d = cur - prev;
      return (d >= 0 ? "+" : "−") + Math.abs(d).toFixed(1) + " pts vs June";
    }
  },
  wau: {
    label: "Weekly active users",
    title: "Weekly active users, last 13 months",
    series: DATA.weekly_active_users,
    fmt: fmtNum,
    downIsGood: false,
    deltaText(cur, prev) {
      const pct = ((cur - prev) / prev) * 100;
      return (cur >= prev ? "+" : "−") + fmtNum(Math.abs(cur - prev)) + " (" + (pct >= 0 ? "+" : "") + pct.toFixed(1) + "%) vs June";
    }
  }
};

let selected = "mrr";
const SVG_NS = "http://www.w3.org/2000/svg";

// ---- KPI cards ----
function sparkPath(series, w, h) {
  const min = Math.min(...series), max = Math.max(...series);
  const span = max - min || 1;
  return series.map((v, i) => {
    const x = (i / (series.length - 1)) * w;
    const y = h - 3 - ((v - min) / span) * (h - 6);
    return (i === 0 ? "M" : "L") + x.toFixed(1) + " " + y.toFixed(1);
  }).join(" ");
}

function renderKPIs() {
  const host = document.getElementById("kpis");
  host.innerHTML = "";
  for (const key of Object.keys(METRICS)) {
    const m = METRICS[key];
    const cur = m.series[m.series.length - 1];
    const prev = m.series[m.series.length - 2];
    const improved = m.downIsGood ? cur < prev : cur > prev;

    const btn = document.createElement("button");
    btn.className = "card kpi";
    btn.type = "button";
    btn.setAttribute("aria-pressed", String(key === selected));
    btn.addEventListener("click", () => selectMetric(key));

    const w = 220, h = 36;
    btn.innerHTML =
      '<span class="kpi-label">' + m.label + '</span>' +
      '<div class="kpi-value">' + m.fmt(cur) + '</div>' +
      '<span class="kpi-delta ' + (improved ? "up" : "down") + '">' + m.deltaText(cur, prev) + '</span>' +
      '<span class="kpi-note">Click to see the full 13-month trend</span>' +
      '<svg class="spark" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none" aria-hidden="true">' +
      '<path d="' + sparkPath(m.series, w, h) + '" fill="none" stroke="var(--chart-line)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    host.appendChild(btn);
  }
}

// ---- Tabs ----
function renderTabs() {
  const host = document.getElementById("tabs");
  host.innerHTML = "";
  for (const key of Object.keys(METRICS)) {
    const b = document.createElement("button");
    b.className = "tab";
    b.type = "button";
    b.textContent = METRICS[key].label;
    b.setAttribute("role", "tab");
    b.setAttribute("aria-selected", String(key === selected));
    b.addEventListener("click", () => selectMetric(key));
    host.appendChild(b);
  }
}

function selectMetric(key) {
  selected = key;
  renderKPIs();
  renderTabs();
  renderTrend();
}

// ---- Big trend chart ----
function el(name, attrs, text) {
  const node = document.createElementNS(SVG_NS, name);
  for (const k in attrs) node.setAttribute(k, attrs[k]);
  if (text !== undefined) node.textContent = text;
  return node;
}

function niceTicks(min, max, count) {
  const span = max - min || 1;
  const step = Math.pow(10, Math.floor(Math.log10(span / count)));
  const err = span / count / step;
  let mult;
  if (err >= 7.5) mult = 10; else if (err >= 3.5) mult = 5; else if (err >= 1.5) mult = 2; else mult = 1;
  const s = mult * step;
  const lo = Math.floor(min / s) * s;
  const hi = Math.ceil(max / s) * s;
  const ticks = [];
  for (let v = lo; v <= hi + s / 2; v += s) ticks.push(Math.round(v * 100) / 100);
  return ticks;
}

function renderTrend() {
  const m = METRICS[selected];
  const svg = document.getElementById("trendChart");
  svg.innerHTML = "";

  document.getElementById("trendTitle").textContent = m.title;
  const cur = m.series[m.series.length - 1];
  document.getElementById("trendSub").textContent =
    monthLabel(DATA.months[0]) + " to " + monthLabel(DATA.months[12]) + " · latest " + m.fmt(cur);

  const W = 960, H = 300, padL = 64, padR = 24, padT = 20, padB = 40;
  const iw = W - padL - padR, ih = H - padT - padB;
  const series = m.series;
  const ticks = niceTicks(Math.min(...series), Math.max(...series), 5);
  const yMin = ticks[0], yMax = ticks[ticks.length - 1];
  const x = i => padL + (i / (series.length - 1)) * iw;
  const y = v => padT + ih - ((v - yMin) / (yMax - yMin || 1)) * ih;

  // gridlines + y labels
  for (const t of ticks) {
    svg.appendChild(el("line", { class: "grid-line", x1: padL, x2: W - padR, y1: y(t), y2: y(t) }));
    svg.appendChild(el("text", { class: "axis-text", x: padL - 8, y: y(t) + 4, "text-anchor": "end" }, m.fmt(t)));
  }

  // x labels (every other month to avoid crowding)
  DATA.months.forEach((mo, i) => {
    if (i % 2 !== 0) return;
    svg.appendChild(el("text", { class: "axis-text", x: x(i), y: H - padB + 20, "text-anchor": "middle" }, monthLabel(mo)));
  });

  // area fill + line
  let line = "";
  series.forEach((v, i) => { line += (i === 0 ? "M" : "L") + x(i).toFixed(1) + " " + y(v).toFixed(1) + " "; });
  const area = line + "L" + x(series.length - 1).toFixed(1) + " " + (padT + ih) + " L" + padL + " " + (padT + ih) + " Z";
  svg.appendChild(el("path", { d: area, fill: "var(--chart-fill)", stroke: "none" }));
  svg.appendChild(el("path", { d: line, fill: "none", stroke: "var(--chart-line)", "stroke-width": 2.5, "stroke-linecap": "round", "stroke-linejoin": "round" }));

  // points with native tooltips
  series.forEach((v, i) => {
    const c = el("circle", { cx: x(i), cy: y(v), r: 3.5, fill: "var(--chart-line)" });
    const tip = el("title", {}, monthLabel(DATA.months[i]) + ": " + m.fmt(v));
    c.appendChild(tip);
    svg.appendChild(c);
  });

  // label the latest point
  svg.appendChild(el("text", { class: "pt-label", x: x(series.length - 1) - 6, y: y(series[series.length - 1]) - 10, "text-anchor": "end" }, m.fmt(cur)));
}

// ---- Feature adoption ----
function renderAdoption() {
  const host = document.getElementById("adoption");
  host.innerHTML = "";
  for (const f of DATA.feature_adoption_pct) {
    const row = document.createElement("div");
    row.className = "adopt-row";
    row.innerHTML =
      '<span class="adopt-name">' + f.feature + '</span>' +
      '<div class="adopt-track" role="img" aria-label="' + f.feature + ' adoption ' + f.pct + ' percent">' +
      '<div class="adopt-fill" style="width: ' + f.pct + '%;"></div></div>' +
      '<span class="adopt-pct">' + f.pct + '%</span>';
    host.appendChild(row);
  }
}

// ---- Signups table ----
function renderSignups() {
  const tbody = document.getElementById("signups");
  tbody.innerHTML = "";
  for (const s of DATA.recent_signups) {
    const tr = document.createElement("tr");
    tr.innerHTML =
      '<td class="company">' + s.company + '</td>' +
      '<td class="muted">' + s.plan + '</td>' +
      '<td class="num">' + s.seats + '</td>' +
      '<td class="num">' + fmtUSD(s.mrr_usd) + '</td>' +
      '<td class="muted">' + s.signed_up + '</td>' +
      '<td><span class="status ' + s.status + '">' + s.status + '</span></td>';
    tbody.appendChild(tr);
  }
}

renderKPIs();
renderTabs();
renderTrend();
renderAdoption();
renderSignups();
</script>
</body>
</html>
