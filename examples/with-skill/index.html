<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ledgerline morning health check</title>
<style>
/* Ledgerline design tokens. Fixture for the with/without validation runs:
   both builds must inline this block verbatim and build strictly from it.
   Light is the default; the dark block activates via prefers-color-scheme. */
:root {
  --bg: #f6f7f9;
  --surface: #ffffff;
  --text: #1a2233;
  --text-2: #55617a;
  --text-3: #8a94ab;
  --border: #e3e7ee;
  --accent: #2f6bff;
  --accent-strong: #1f4fd6;
  --good: #17805c;
  --good-bg: #e3f4ec;
  --bad: #c2372e;
  --bad-bg: #fbe9e7;
  --warn: #9a6a00;
  --warn-bg: #fff3d6;
  --chart-line: #2f6bff;
  --chart-fill: rgba(47, 107, 255, 0.10);
  --font: system-ui, "Segoe UI", Roboto, sans-serif;
  --radius: 10px;
  --shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
  /* spacing scale: draw every margin, padding, and gap from these steps */
  --s1: 4px;
  --s2: 8px;
  --s3: 12px;
  --s4: 16px;
  --s5: 24px;
  --s6: 32px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #11151d;
    --surface: #1a2029;
    --text: #e8ecf4;
    --text-2: #a7b0c3;
    --text-3: #707a90;
    --border: #2a3140;
    --accent: #6b96ff;
    --accent-strong: #8fadff;
    --good: #4cc394;
    --good-bg: #14322a;
    --bad: #ef8a7f;
    --bad-bg: #3a1f1c;
    --warn: #d9b25e;
    --warn-bg: #35290f;
    --chart-line: #6b96ff;
    --chart-fill: rgba(107, 150, 255, 0.14);
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
  }
}

/* ---- base ---- */
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); }
body {
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg);
}
.wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: var(--s5);
}
button { font: inherit; color: inherit; }
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: var(--radius);
}
.visually-hidden {
  position: absolute;
  width: 1px; height: 1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
  white-space: nowrap;
}

/* ---- header ---- */
.masthead {
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: var(--s3);
  margin-bottom: var(--s5);
}
.brand { font-size: 14px; font-weight: 700; color: var(--accent-strong); }
.masthead h1 { font-size: 18px; font-weight: 650; }
.asof { margin-left: auto; font-size: 13px; color: var(--text-3); }

/* ---- layout tiers ---- */
.kpis {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--s4);
  margin-bottom: var(--s5);
}
.trends-head, .tablebar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: var(--s3);
  margin-bottom: var(--s3);
}
.trends-head h2, .bottom h2 { font-size: 14px; font-weight: 650; }
.trends-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--s4);
}
.trends { margin-bottom: var(--s5); }
.bottom {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: var(--s4);
  align-items: start;
}
/* keep nowrap tables and wide charts from blowing the grids open */
.kpis > *, .trends-grid > *, .bottom > * { min-width: 0; }
@media (max-width: 980px) {
  .trends-grid, .bottom { grid-template-columns: 1fr; }
}
@media (max-width: 700px) {
  .kpis { grid-template-columns: 1fr; }
  .wrap { padding: var(--s4); }
}

/* ---- cards & tiles ---- */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: var(--s4);
}
.card > h3, .card > h2 {
  font-size: 14px;
  font-weight: 650;
  margin-bottom: var(--s1);
}
.card .sub {
  font-size: 12px;
  color: var(--text-3);
  margin-bottom: var(--s3);
}
.tile .label { font-size: 13px; color: var(--text-2); margin-bottom: var(--s2); }
.tile .value { font-size: 20px; font-weight: 650; line-height: 1.2; }
.tile--lead .value { font-size: 28px; }
.tile .delta { margin-top: var(--s2); font-size: 13px; font-weight: 600; }
.tile .delta.good { color: var(--good); }
.tile .delta.bad { color: var(--bad); }
.tile .context { margin-top: var(--s1); font-size: 12px; color: var(--text-3); }

/* ---- charts ---- */
.chartwrap { position: relative; }
.chartwrap svg { display: block; width: 100%; height: auto; font-family: var(--font); }
.chartwrap [tabindex="0"] { border-radius: var(--radius); }
.tip {
  position: absolute;
  pointer-events: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: var(--s1) var(--s2);
  font-size: 12px;
  white-space: nowrap;
}
.tip strong { display: block; font-size: 13px; color: var(--text); }
.tip span { color: var(--text-2); }
.hint { font-size: 12px; color: var(--text-3); margin-top: var(--s2); }

/* ---- segmented control ---- */
.seg {
  margin-left: auto;
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  overflow: hidden;
}
.seg button {
  border: 0;
  background: none;
  padding: var(--s1) var(--s3);
  font-size: 13px;
  color: var(--text-2);
  cursor: pointer;
}
.seg button[aria-pressed="true"] {
  background: var(--accent);
  color: var(--surface);
  font-weight: 600;
}
@media (prefers-reduced-motion: no-preference) {
  .seg button { transition: background-color 120ms ease, color 120ms ease; }
  .rowlink, .th-btn { transition: background-color 120ms ease; }
}

/* ---- adoption bars ---- */
.adopt { display: grid; gap: var(--s3); }
.adopt-row {
  display: grid;
  grid-template-columns: 118px 1fr 44px;
  gap: var(--s3);
  align-items: center;
}
.adopt-row .name { font-size: 13px; color: var(--text-2); }
.adopt-row .track {
  background: var(--chart-fill);
  border-radius: var(--radius);
  height: var(--s3);
}
.adopt-row .fill {
  background: var(--chart-line);
  border-radius: var(--radius);
  height: var(--s3);
}
.adopt-row .num {
  font-size: 13px;
  text-align: right;
  font-variant-numeric: tabular-nums;
  color: var(--text);
}

/* ---- tables ---- */
.tscroll { overflow-x: auto; }
table { border-collapse: collapse; width: 100%; font-size: 13px; }
th, td {
  text-align: left;
  padding: var(--s2) var(--s3);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
th { color: var(--text-2); font-weight: 600; font-size: 12px; }
td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
tbody tr:hover { background: var(--bg); }
tbody tr:last-child td { border-bottom: 0; }
.th-btn {
  border: 0;
  background: none;
  padding: 0;
  font: inherit;
  color: inherit;
  cursor: pointer;
  border-radius: var(--radius);
}
.th-btn .dir { color: var(--accent-strong); }
.th-btn:hover { color: var(--text); }

/* ---- chips ---- */
.chip {
  display: inline-block;
  padding: 0 var(--s2);
  border-radius: var(--radius);
  font-size: 12px;
  font-weight: 600;
  line-height: 1.7;
}
.chip--good { color: var(--good); background: var(--good-bg); }
.chip--warn { color: var(--warn); background: var(--warn-bg); }
.chip--bad { color: var(--bad); background: var(--bad-bg); }
.chip--plain { color: var(--text-2); background: var(--bg); border: 1px solid var(--border); }

/* ---- controls above signups table ---- */
.tablebar { margin-bottom: 0; padding: var(--s3) 0; }
.tablebar input[type="search"], .tablebar select {
  font: inherit;
  font-size: 13px;
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: var(--s1) var(--s3);
}
.tablebar input[type="search"] { min-width: 160px; }
.count { margin-left: auto; font-size: 12px; color: var(--text-3); }

/* ---- states ---- */
.skeleton {
  background: var(--border);
  border-radius: var(--radius);
  min-height: var(--s5);
}
.skeleton + .skeleton { margin-top: var(--s3); }
.skeleton--tall { min-height: 140px; }
@media (prefers-reduced-motion: no-preference) {
  .skeleton { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
}
.state {
  padding: var(--s4);
  font-size: 13px;
  color: var(--text-2);
}
.state strong { display: block; color: var(--text); margin-bottom: var(--s1); }
.state .actions { margin-top: var(--s3); }
.btn {
  display: inline-block;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--accent-strong);
  font-size: 13px;
  font-weight: 600;
  padding: var(--s1) var(--s3);
  border-radius: var(--radius);
  cursor: pointer;
}
.btn:hover { background: var(--bg); }
.note {
  margin-top: var(--s2);
  font-size: 12px;
  color: var(--warn);
  background: var(--warn-bg);
  border-radius: var(--radius);
  padding: var(--s1) var(--s2);
  display: inline-block;
}
footer { margin-top: var(--s5); font-size: 12px; color: var(--text-3); }
</style>
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <span class="brand">Ledgerline</span>
    <h1>Morning health check</h1>
    <span class="asof">Data through Jul 19, 2026</span>
  </header>

  <noscript>
    <div class="card state" style="margin-bottom: var(--s5);">
      <strong>This dashboard needs JavaScript</strong>
      All data is embedded in this file, but the charts and tables are
      rendered client-side. Enable JavaScript and reload.
    </div>
  </noscript>

  <!-- Tier 1: headline KPIs -->
  <section class="kpis" aria-label="Headline metrics">
    <div class="card tile tile--lead" id="w-kpi-mrr"><div class="skeleton"></div><div class="skeleton"></div></div>
    <div class="card tile" id="w-kpi-churn"><div class="skeleton"></div><div class="skeleton"></div></div>
    <div class="card tile" id="w-kpi-wau"><div class="skeleton"></div><div class="skeleton"></div></div>
  </section>

  <!-- Tier 2: trends -->
  <section class="trends" aria-label="Thirteen-month trends">
    <div class="trends-head">
      <h2>Last 13 months</h2>
      <div class="seg" role="group" aria-label="Trend view">
        <button type="button" id="seg-chart" aria-pressed="true">Charts</button>
        <button type="button" id="seg-table" aria-pressed="false">Table</button>
      </div>
    </div>
    <div class="trends-grid" id="trend-charts">
      <div class="card" id="w-trend-mrr"><div class="skeleton"></div><div class="skeleton skeleton--tall"></div></div>
      <div class="card" id="w-trend-churn"><div class="skeleton"></div><div class="skeleton skeleton--tall"></div></div>
      <div class="card" id="w-trend-wau"><div class="skeleton"></div><div class="skeleton skeleton--tall"></div></div>
    </div>
    <div class="card" id="w-trend-table" hidden><div class="skeleton skeleton--tall"></div></div>
  </section>

  <!-- Tier 3: adoption + signups -->
  <section class="bottom" aria-label="Adoption and recent signups">
    <div class="card" id="w-adoption"><div class="skeleton"></div><div class="skeleton skeleton--tall"></div></div>
    <div class="card" id="w-signups"><div class="skeleton"></div><div class="skeleton skeleton--tall"></div></div>
  </section>

  <footer>All figures are fixture data for the Ledgerline demo. Amounts in USD.</footer>
</div>

<script>
"use strict";

/* ---- fixture data, hardcoded verbatim ---- */
const DATA = {
  "product": "Ledgerline",
  "as_of": "2026-07-19",
  "months": ["2025-07", "2025-08", "2025-09", "2025-10", "2025-11", "2025-12", "2026-01", "2026-02", "2026-03", "2026-04", "2026-05", "2026-06", "2026-07"],
  "mrr_usd": [62400, 64100, 65800, 67900, 69400, 71600, 73200, 75100, 77400, 79000, 80900, 82600, 84120],
  "churn_pct": [3.4, 3.2, 3.3, 3.0, 2.9, 2.7, 2.8, 2.5, 2.4, 2.2, 2.1, 2.0, 1.8],
  "weekly_active_users": [890, 910, 946, 972, 1004, 1035, 1061, 1090, 1122, 1158, 1189, 1233, 1284],
  "feature_adoption_pct": [
    { "feature": "Automations", "pct": 89 },
    { "feature": "Shared inboxes", "pct": 83 },
    { "feature": "API access", "pct": 72 },
    { "feature": "Reporting", "pct": 60 },
    { "feature": "Slack sync", "pct": 51 },
    { "feature": "CSV export", "pct": 31 },
    { "feature": "SSO / SAML", "pct": 18 }
  ],
  "recent_signups": [
    { "company": "Quill Analytics", "plan": "Growth", "seats": 18, "mrr_usd": 882, "signed_up": "2026-07-19", "status": "trial" },
    { "company": "Copperline HVAC", "plan": "Starter", "seats": 4, "mrr_usd": 116, "signed_up": "2026-07-19", "status": "active" },
    { "company": "Marrow Bio", "plan": "Scale", "seats": 34, "mrr_usd": 2686, "signed_up": "2026-07-18", "status": "trial" },
    { "company": "Pinebox Studio", "plan": "Starter", "seats": 6, "mrr_usd": 174, "signed_up": "2026-07-17", "status": "active" },
    { "company": "Atlas Cargo", "plan": "Growth", "seats": 22, "mrr_usd": 1078, "signed_up": "2026-07-16", "status": "active" },
    { "company": "Verity Audit", "plan": "Growth", "seats": 11, "mrr_usd": 539, "signed_up": "2026-07-14", "status": "trial" },
    { "company": "Harbor & Lane", "plan": "Starter", "seats": 3, "mrr_usd": 87, "signed_up": "2026-07-12", "status": "churned" },
    { "company": "Oakfield Schools", "plan": "Scale", "seats": 40, "mrr_usd": 3160, "signed_up": "2026-07-10", "status": "active" },
    { "company": "Fernworks", "plan": "Starter", "seats": 5, "mrr_usd": 145, "signed_up": "2026-07-08", "status": "trial" },
    { "company": "Sundial Travel", "plan": "Growth", "seats": 14, "mrr_usd": 686, "signed_up": "2026-07-05", "status": "active" },
    { "company": "Rove Logistics", "plan": "Growth", "seats": 19, "mrr_usd": 931, "signed_up": "2026-07-02", "status": "active" },
    { "company": "Meridian Clinics", "plan": "Scale", "seats": 27, "mrr_usd": 2133, "signed_up": "2026-06-28", "status": "active" },
    { "company": "Tessel Print", "plan": "Starter", "seats": 2, "mrr_usd": 58, "signed_up": "2026-06-25", "status": "trial" },
    { "company": "Bluestem Farms", "plan": "Starter", "seats": 7, "mrr_usd": 203, "signed_up": "2026-06-22", "status": "active" }
  ]
};

/* ---- helpers ---- */
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const fmtUsd = n => "$" + n.toLocaleString("en-US");
const fmtNum = n => n.toLocaleString("en-US");
const monthShort = m => MONTHS[+m.slice(5, 7) - 1];
const monthYear = m => monthShort(m) + " ’" + m.slice(2, 4);
const monthFull = m => monthShort(m) + " " + m.slice(0, 4);
const dayLabel = d => monthShort(d) + " " + (+d.slice(8, 10));

function el(tag, cls, text) {
  const node = document.createElement(tag);
  if (cls) node.className = cls;
  if (text !== undefined) node.textContent = text;
  return node;
}

function stateBlock(host, title, body, actionLabel, action) {
  host.textContent = "";
  const box = el("div", "state");
  box.appendChild(el("strong", null, title));
  box.appendChild(document.createTextNode(body));
  if (actionLabel) {
    const row = el("div", "actions");
    const btn = el("button", "btn", actionLabel);
    btn.type = "button";
    btn.addEventListener("click", action);
    row.appendChild(btn);
    box.appendChild(row);
  }
  host.appendChild(box);
}

/* Trim parallel series to matching length; report partial data. */
function alignSeries(months, values) {
  const n = Math.min(months.length, values.length);
  return { months: months.slice(0, n), values: values.slice(0, n), partial: n < Math.max(months.length, values.length), n };
}

function niceTicks(min, max) {
  const raw = (max - min) / 3;
  if (!(raw > 0)) return [min];
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  const norm = raw / mag;
  const step = norm > 5 ? 10 * mag : norm > 2 ? 5 * mag : norm > 1 ? 2 * mag : mag;
  const out = [];
  for (let v = Math.ceil(min / step) * step; v <= max + 1e-9; v += step) out.push(+v.toFixed(6));
  return out;
}

/* ---- widget registry with per-widget error handling ---- */
const widgets = {};
function renderWidget(id) {
  const host = document.getElementById(id);
  if (!host) return;
  try {
    widgets[id](host);
  } catch (err) {
    stateBlock(host, "Something went wrong in this panel",
      "The rest of the dashboard is unaffected. Retry rendering this panel.",
      "Retry", () => renderWidget(id));
  }
}

/* ---- KPI tiles ---- */
function makeTile(host, cfg) {
  host.textContent = "";
  host.appendChild(el("div", "label", cfg.label));
  if (!cfg.values || cfg.values.length === 0) {
    stateBlock(host, "No data yet for this metric",
      "It will appear once " + cfg.label.toLowerCase() + " has been recorded.");
    return;
  }
  const cur = cfg.values[cfg.values.length - 1];
  host.appendChild(el("div", "value", cfg.fmt(cur)));
  if (cfg.values.length < 2) {
    host.appendChild(el("div", "context", "No prior month to compare yet."));
  } else {
    const prev = cfg.values[cfg.values.length - 2];
    const d = cur - prev;
    const good = cfg.downIsGood ? d <= 0 : d >= 0;
    const delta = el("div", "delta " + (good ? "good" : "bad"), cfg.deltaFmt(d, prev) + " vs " + monthShort(cfg.months[cfg.months.length - 2]));
    host.appendChild(delta);
    host.appendChild(el("div", "context", cfg.context(cfg.values[0], cur)));
  }
}

widgets["w-kpi-mrr"] = host => {
  const s = alignSeries(DATA.months, DATA.mrr_usd);
  makeTile(host, {
    label: "Monthly recurring revenue",
    months: s.months, values: s.values,
    fmt: fmtUsd,
    deltaFmt: (d, prev) => (d >= 0 ? "+" : "−") + fmtUsd(Math.abs(d)) + " (" + (d >= 0 ? "+" : "−") + Math.abs(d / prev * 100).toFixed(1) + "%)",
    context: (first, cur) => "Up " + ((cur / first - 1) * 100).toFixed(1) + "% from a year ago",
    downIsGood: false
  });
};
widgets["w-kpi-churn"] = host => {
  const s = alignSeries(DATA.months, DATA.churn_pct);
  makeTile(host, {
    label: "Monthly churn rate",
    months: s.months, values: s.values,
    fmt: v => v.toFixed(1) + "%",
    deltaFmt: d => (d >= 0 ? "+" : "−") + Math.abs(d).toFixed(1) + " pp",
    context: first => "Down from " + first.toFixed(1) + "% a year ago",
    downIsGood: true
  });
};
widgets["w-kpi-wau"] = host => {
  const s = alignSeries(DATA.months, DATA.weekly_active_users);
  makeTile(host, {
    label: "Weekly active users",
    months: s.months, values: s.values,
    fmt: fmtNum,
    deltaFmt: (d, prev) => (d >= 0 ? "+" : "−") + fmtNum(Math.abs(d)) + " (" + (d >= 0 ? "+" : "−") + Math.abs(d / prev * 100).toFixed(1) + "%)",
    context: (first, cur) => "Up " + ((cur / first - 1) * 100).toFixed(1) + "% from a year ago",
    downIsGood: false
  });
};

/* ---- line chart ---- */
function lineChart(host, cfg) {
  host.textContent = "";
  host.appendChild(el("h3", null, cfg.title));
  host.appendChild(el("div", "sub", cfg.sub));

  const s = alignSeries(cfg.months, cfg.values);
  if (s.n === 0) {
    stateBlock(host, "No history recorded yet",
      "Monthly values will chart here as they accrue.");
    return;
  }

  const W = 360, H = 168, padL = 46, padR = 16, padT = 18, padB = 24;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const vMin = Math.min(...s.values), vMax = Math.max(...s.values);
  const pad = (vMax - vMin) * 0.14 || Math.abs(vMax) * 0.1 || 1;
  const y0 = vMin - pad, y1 = vMax + pad;
  const X = i => s.n === 1 ? padL + plotW / 2 : padL + i * (plotW / (s.n - 1));
  const Y = v => padT + (1 - (v - y0) / (y1 - y0)) * plotH;

  let svg = "";
  for (const t of niceTicks(y0, y1)) {
    const y = Y(t).toFixed(1);
    svg += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;
    svg += `<text x="${padL - 6}" y="${y}" dy="3" text-anchor="end" font-size="10" style="font-variant-numeric:tabular-nums" fill="var(--text-3)">${cfg.yFmt(t)}</text>`;
  }
  const step = Math.max(1, Math.round((s.n - 1) / 4));
  for (let i = 0; i < s.n; i += step) {
    const lbl = (i === 0 || s.months[i].slice(5) === "01") ? monthYear(s.months[i]) : monthShort(s.months[i]);
    svg += `<text x="${X(i).toFixed(1)}" y="${H - 6}" text-anchor="middle" font-size="10" fill="var(--text-3)">${lbl}</text>`;
  }
  const pts = s.values.map((v, i) => X(i).toFixed(1) + "," + Y(v).toFixed(1));
  svg += `<polygon points="${X(0).toFixed(1)},${(padT + plotH).toFixed(1)} ${pts.join(" ")} ${X(s.n - 1).toFixed(1)},${(padT + plotH).toFixed(1)}" fill="var(--chart-fill)"/>`;
  svg += `<polyline points="${pts.join(" ")}" fill="none" stroke="var(--chart-line)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
  const lx = X(s.n - 1), ly = Y(s.values[s.n - 1]);
  svg += `<circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="4.5" fill="var(--chart-line)" stroke="var(--surface)" stroke-width="2"/>`;
  svg += `<text x="${(lx - 8).toFixed(1)}" y="${(ly - 10).toFixed(1)}" text-anchor="middle" font-size="11" font-weight="600" fill="var(--text)">${cfg.valFmt(s.values[s.n - 1])}</text>`;
  svg += `<line id="cross" x1="0" y1="${padT}" x2="0" y2="${padT + plotH}" stroke="var(--text-3)" stroke-width="1" visibility="hidden"/>`;
  svg += `<circle id="hot" r="5" fill="var(--chart-line)" stroke="var(--surface)" stroke-width="2" visibility="hidden"/>`;

  const wrap = el("div", "chartwrap");
  const fig = el("div");
  fig.setAttribute("tabindex", "0");
  fig.setAttribute("role", "img");
  fig.setAttribute("aria-label", cfg.title + ". " + cfg.sub + ". Latest value " + cfg.valFmt(s.values[s.n - 1]) +
    " in " + monthFull(s.months[s.n - 1]) + ". Use left and right arrow keys to read each month; the same values are in the table view.");
  fig.innerHTML = `<svg viewBox="0 0 ${W} ${H}" aria-hidden="true">${svg}</svg>`;
  wrap.appendChild(fig);
  const tip = el("div", "tip");
  tip.hidden = true;
  const tipVal = el("strong");
  const tipMonth = el("span");
  tip.appendChild(tipVal);
  tip.appendChild(tipMonth);
  wrap.appendChild(tip);
  host.appendChild(wrap);
  if (s.partial) host.appendChild(el("div", "note", "Showing " + s.n + " of " + Math.max(cfg.months.length, cfg.values.length) + " months"));

  const svgEl = fig.querySelector("svg");
  const cross = svgEl.querySelector("#cross");
  const hot = svgEl.querySelector("#hot");
  let idx = -1;

  function show(i) {
    idx = Math.max(0, Math.min(s.n - 1, i));
    const x = X(idx), y = Y(s.values[idx]);
    cross.setAttribute("x1", x); cross.setAttribute("x2", x);
    cross.setAttribute("visibility", "visible");
    hot.setAttribute("cx", x); hot.setAttribute("cy", y);
    hot.setAttribute("visibility", "visible");
    tipVal.textContent = cfg.valFmt(s.values[idx]);
    tipMonth.textContent = monthFull(s.months[idx]);
    tip.hidden = false;
    const r = svgEl.getBoundingClientRect();
    const px = x / W * r.width, py = y / H * r.height;
    const left = Math.max(0, Math.min(r.width - tip.offsetWidth, px + 12));
    const top = Math.max(0, py - tip.offsetHeight - 12);
    tip.style.left = left + "px";
    tip.style.top = top + "px";
  }
  function hide() {
    idx = -1;
    cross.setAttribute("visibility", "hidden");
    hot.setAttribute("visibility", "hidden");
    tip.hidden = true;
  }
  fig.addEventListener("pointermove", e => {
    const r = svgEl.getBoundingClientRect();
    const vx = (e.clientX - r.left) / r.width * W;
    show(Math.round((vx - padL) / (plotW / Math.max(1, s.n - 1))));
  });
  fig.addEventListener("pointerleave", () => { if (document.activeElement !== fig) hide(); });
  fig.addEventListener("keydown", e => {
    if (e.key === "ArrowRight") { show(idx < 0 ? s.n - 1 : idx + 1); e.preventDefault(); }
    else if (e.key === "ArrowLeft") { show(idx < 0 ? s.n - 1 : idx - 1); e.preventDefault(); }
    else if (e.key === "Escape") hide();
  });
  fig.addEventListener("focus", () => show(s.n - 1));
  fig.addEventListener("blur", hide);
}

/* ---- recent signups table ---- */
const signupState = { q: "", status: "all", sortKey: "signed_up", sortDir: "desc" };
const SIGNUP_COLS = [
  { key: "company", label: "Company", num: false },
  { key: "plan", label: "Plan", num: false },
  { key: "seats", label: "Seats", num: true },
  { key: "mrr_usd", label: "MRR", num: true },
  { key: "signed_up", label: "Signed up", num: false },
  { key: "status", label: "Status", num: false }
];
const STATUS_CHIP = { active: "chip--good", trial: "chip--warn", churned: "chip--bad" };

widgets["w-signups"] = host => {
  host.textContent = "";
  const all = DATA.recent_signups || [];
  const trials = all.filter(r => r.status === "trial").length;
  const churned = all.filter(r => r.status === "churned").length;
  host.appendChild(el("h3", null, "Recent signups: " + trials + " open trials, " + churned + " churned"));
  host.appendChild(el("div", "sub", "Newest first. Trials are this morning's follow-up list."));
  if (all.length === 0) {
    stateBlock(host, "No signups recorded yet",
      "New accounts will appear here as they sign up.");
    return;
  }

  /* controls */
  const bar = el("div", "tablebar");
  const search = document.createElement("input");
  search.type = "search";
  search.placeholder = "Search company";
  search.setAttribute("aria-label", "Search signups by company");
  search.value = signupState.q;
  const select = document.createElement("select");
  select.setAttribute("aria-label", "Filter by status");
  [["all", "All statuses"], ["active", "Active"], ["trial", "Trial"], ["churned", "Churned"]].forEach(([v, t]) => {
    const o = el("option", null, t);
    o.value = v;
    if (v === signupState.status) o.selected = true;
    select.appendChild(o);
  });
  const count = el("span", "count");
  bar.appendChild(search);
  bar.appendChild(select);
  bar.appendChild(count);
  host.appendChild(bar);

  const scroll = el("div", "tscroll");
  host.appendChild(scroll);

  function currentRows() {
    let rows = all.filter(r =>
      (signupState.status === "all" || r.status === signupState.status) &&
      r.company.toLowerCase().includes(signupState.q.trim().toLowerCase()));
    const k = signupState.sortKey, dir = signupState.sortDir === "asc" ? 1 : -1;
    rows = rows.slice().sort((a, b) => {
      const av = a[k], bv = b[k];
      const cmp = typeof av === "number" ? av - bv : String(av).localeCompare(String(bv));
      return cmp * dir;
    });
    return rows;
  }

  function drawTable() {
    scroll.textContent = "";
    const rows = currentRows();
    count.textContent = "Showing " + rows.length + " of " + all.length;

    if (rows.length === 0) {
      stateBlock(scroll, "No signups match",
        "Nothing fits that search and filter. Clear them to see all " + all.length + " signups.",
        "Clear filters", () => {
          signupState.q = ""; signupState.status = "all";
          search.value = ""; select.value = "all";
          drawTable();
        });
      return;
    }

    const table = el("table");
    table.appendChild(el("caption", "visually-hidden", "Recent signups"));
    const thead = el("thead");
    const hr = el("tr");
    for (const col of SIGNUP_COLS) {
      const th = el("th", col.num ? "num" : null);
      th.scope = "col";
      const active = signupState.sortKey === col.key;
      th.setAttribute("aria-sort", active ? (signupState.sortDir === "asc" ? "ascending" : "descending") : "none");
      const btn = el("button", "th-btn");
      btn.type = "button";
      btn.appendChild(document.createTextNode(col.label));
      if (active) {
        const dir = el("span", "dir", signupState.sortDir === "asc" ? " ▲" : " ▼");
        dir.setAttribute("aria-hidden", "true");
        btn.appendChild(dir);
      }
      btn.setAttribute("aria-label", "Sort by " + col.label.toLowerCase() +
        (active ? (signupState.sortDir === "asc" ? ", currently ascending" : ", currently descending") : ""));
      btn.addEventListener("click", () => {
        if (signupState.sortKey === col.key) {
          signupState.sortDir = signupState.sortDir === "asc" ? "desc" : "asc";
        } else {
          signupState.sortKey = col.key;
          signupState.sortDir = col.num ? "desc" : "asc";
        }
        drawTable();
      });
      th.appendChild(btn);
      hr.appendChild(th);
    }
    thead.appendChild(hr);
    table.appendChild(thead);

    const tbody = el("tbody");
    for (const r of rows) {
      const tr = el("tr");
      const cName = el("td");
      cName.appendChild(el("strong", null, r.company));
      tr.appendChild(cName);
      const cPlan = el("td");
      cPlan.appendChild(el("span", "chip chip--plain", r.plan));
      tr.appendChild(cPlan);
      tr.appendChild(el("td", "num", fmtNum(r.seats)));
      tr.appendChild(el("td", "num", fmtUsd(r.mrr_usd)));
      tr.appendChild(el("td", null, dayLabel(r.signed_up)));
      const cStatus = el("td");
      cStatus.appendChild(el("span", "chip " + (STATUS_CHIP[r.status] || "chip--plain"), r.status));
      tr.appendChild(cStatus);
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    scroll.appendChild(table);
  }

  search.addEventListener("input", () => { signupState.q = search.value; drawTable(); });
  select.addEventListener("change", () => { signupState.status = select.value; drawTable(); });
  drawTable();
};

/* ---- chart / table toggle for the trends tier ---- */
function initToggle() {
  const bChart = document.getElementById("seg-chart");
  const bTable = document.getElementById("seg-table");
  const charts = document.getElementById("trend-charts");
  const tableCard = document.getElementById("w-trend-table");
  function setView(view) {
    const isChart = view === "chart";
    bChart.setAttribute("aria-pressed", String(isChart));
    bTable.setAttribute("aria-pressed", String(!isChart));
    charts.hidden = !isChart;
    tableCard.hidden = isChart;
  }
  bChart.addEventListener("click", () => setView("chart"));
  bTable.addEventListener("click", () => setView("table"));
}

/* ---- boot ---- */
for (const id of Object.keys(widgets)) renderWidget(id);
initToggle();
</script>
